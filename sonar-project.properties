# SonarCloud project identity. Matches the project key registered on
# SonarCloud and used by the cicd skill's Sonar status queries
# (`agentculture_ec2-cli`).
sonar.projectKey=agentculture_ec2-cli
sonar.organization=agentculture

# Source layout — package lives at the top level (no src/ wrapper).
sonar.sources=ec2
sonar.tests=tests

# Coverage report produced in CI by `uv run pytest --cov-report=xml:coverage.xml`
# (see .github/workflows/tests.yml). Path is relative to the repo root.
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.version=3.12

# Don't analyze noise.
sonar.exclusions=**/__pycache__/**,**/.venv/**,uv.lock,.claude/skills/**

# Documented false-positive suppressions (reviewed in-repo, not hidden per-issue
# marking). Each is a Sonar rule whose premise does not hold for this code.
sonar.issue.ignore.multicriteria=s2083cfg1,s2083cfg2,s3516cli
# S2083 (path-injection): limits.py / deletion.py write a fixed-name JSON file
# under the user's own ~/.config (path from Path.home() + literals, guarded at
# the write sink). Sonar's taint flags the test-only config_dir parameter; a
# local CLI writing its own config file is not an injection vector.
sonar.issue.ignore.multicriteria.s2083cfg1.ruleKey=pythonsecurity:S2083
sonar.issue.ignore.multicriteria.s2083cfg1.resourceKey=**/limits.py
sonar.issue.ignore.multicriteria.s2083cfg2.ruleKey=pythonsecurity:S2083
sonar.issue.ignore.multicriteria.s2083cfg2.resourceKey=**/deletion.py
# S3516 ("always returns the same value"): the instance command handlers return
# 0 on success by the CLI exit-code contract — a constant return is correct.
sonar.issue.ignore.multicriteria.s3516cli.ruleKey=python:S3516
sonar.issue.ignore.multicriteria.s3516cli.resourceKey=**/_commands/instance.py

# Block CI on a failing quality gate. The scanner polls SonarCloud and exits
# non-zero on a red gate (coverage regression, new bugs/vulnerabilities). Only
# takes effect when the SonarCloud Scan step runs — that step is guarded by
# `if: env.SONAR_TOKEN != ''` in .github/workflows/tests.yml, so token-less
# repos and fork PRs (no injected secret) skip the scan and stay green.
sonar.qualitygate.wait=true
